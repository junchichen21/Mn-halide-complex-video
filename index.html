<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Selector</title>
</head>

<body style="text-align:center; background:#000; color:white;">

<h2>Choose a Video</h2>

<video id="player" controls width="80%">
  <source src="Mn-Br_NVTMD_h264.mp4" type="video/mp4">
</video>

<br><br>

<button onclick="playVideo('Mn-Br_NVTMD_h264.mp4')">Mn-Br</button>
<button onclick="playVideo('Mn-Cl_NVTMD_h264.mp4')">Mn-Cl</button>
<button onclick="playVideo('Mn-I_NVTMD_h264.mp4')">Mn-I</button>

<script>
function playVideo(src) {
  const player = document.getElementById('player');
  player.src = src;
  player.play();
}
</script>

</body>
</html>
