<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mn Nanocrystal Videos</title>
  <style>
    :root {
      --bg: #0b0f14;
      --card: #121821;
      --text: #f5f7fa;
      --muted: #b8c0cc;
      --accent: #b22222;
      --accent-hover: #8f1b1b;
      --border: #273142;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b0f14 0%, #111827 100%);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 760px;
      color: var(--muted);
      font-size: 1rem;
    }

    .card {
      background: rgba(18, 24, 33, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    .video-title {
      margin: 0 0 14px;
      font-size: 1.25rem;
      text-align: center;
    }

    .video-wrapper {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
    }

    video {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .video-btn {
      border: 1px solid var(--border);
      background: #18202b;
      color: var(--text);
      padding: 14px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .video-btn:hover {
      transform: translateY(-1px);
      background: #1f2a38;
      border-color: #3b4b63;
    }

    .video-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .caption {
      margin-top: 16px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 16px;
      }

      .video-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">Mn Nanocrystal Videos</h1>
      <p class="subtitle">
        Select a simulation video below to view the corresponding Mn halide system.
      </p>
    </header>

    <main class="card">
      <h2 class="video-title" id="videoTitle">Mn-Br_NVTMD_h264.mp4</h2>

      <div class="video-wrapper">
        <video id="player" controls playsinline preload="metadata">
          <source src="Mn-Br_NVTMD_h264.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>

      <div class="controls">
        <button class="video-btn active" onclick="switchVideo('Mn-Br_NVTMD_h264.mp4', 'Mn-Br')">
          Mn-Br
        </button>
        <button class="video-btn" onclick="switchVideo('Mn-Cl_NVTMD_h264.mp4', 'Mn-Cl')">
          Mn-Cl
        </button>
        <button class="video-btn" onclick="switchVideo('Mn-I_NVTMD_h264.mp4', 'Mn-I')">
          Mn-I
        </button>
      </div>

      <p class="caption" id="caption">
        Currently viewing: Mn-Br
      </p>
    </main>

    <footer class="footer">
      Hosted with GitHub Pages
    </footer>
  </div>

  <script>
    function switchVideo(fileName, label) {
      const player = document.getElementById("player");
      const title = document.getElementById("videoTitle");
      const caption = document.getElementById("caption");
      const buttons = document.querySelectorAll(".video-btn");

      player.pause();
      player.src = fileName;
      player.load();

      title.textContent = fileName;
      caption.textContent = "Currently viewing: " + label;

      buttons.forEach((btn) => btn.classList.remove("active"));

      const clickedButton = Array.from(buttons).find(
        (btn) => btn.textContent.trim() === label
      );
      if (clickedButton) {
        clickedButton.classList.add("active");
      }
    }
  </script>
</body>
</html>
